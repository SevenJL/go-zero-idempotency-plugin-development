{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "idempotency-example.fullname" . }}
  labels:
    {{- include "idempotency-example.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "idempotency-example.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
      {{- if .Values.networkPolicy.allowedCIDRs }}
      from:
        {{- range .Values.networkPolicy.allowedCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      {{- end }}
{{- end }}
