# =============================================================================
# CI Pipeline — lint, test, build, coverage
#
# Triggers:
#   - Push to main
#   - Pull request to main
#   - Manual dispatch (workflow_dispatch)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.25"

jobs:
  # ---------------------------------------------------------------------------
  # Build — verify the example app compiles
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build example binary
        run: go build -o /dev/null ./examples/gin/

      - name: Build check all packages
        run: go build ./...

  # ---------------------------------------------------------------------------
  # Docker — build image and verify it starts (smoke test)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: idempotency-example:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — start container and check health
        run: |
          docker run -d --rm -p 8080:8080 --name ci-smoke idempotency-example:ci-test
          # Wait for startup and check health endpoint
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Container failed to become healthy"
          docker logs ci-smoke
          exit 1

      - name: Cleanup
        if: always()
        run: docker stop ci-smoke || true
