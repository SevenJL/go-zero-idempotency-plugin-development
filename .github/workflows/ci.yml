# =============================================================================
# Build and deploy pipeline
#
# Required GitHub secrets:
#   DEPLOY_HOST     Remote server host or IP
#   DEPLOY_USER     SSH user on the remote server
#   DEPLOY_SSH_KEY  Private SSH key with access to the remote server
#
# Optional GitHub secrets:
#   DEPLOY_PORT     SSH port, defaults to 22
#   DEPLOY_PATH     Remote deploy directory, defaults to /opt/idempotency-example
#   APP_PORT        Public HTTP port, defaults to 8080
#
# Docker image archives are kept as GitHub Actions artifacts and are also copied
# to ${DEPLOY_PATH}/images on the remote server.
# =============================================================================

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.25"
  IMAGE_NAME: idempotency-example
  CONTAINER_NAME: idempotency-example
  CONTAINER_PORT: "8080"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Capture build metadata
        id: metadata
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Build example binary
        env:
          BUILD_TIME: ${{ steps.metadata.outputs.build_time }}
        run: |
          mkdir -p bin
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME} -X main.Commit=${GITHUB_SHA} -X main.BuildTime=${BUILD_TIME}" \
            -o bin/idempotency-example \
            ./examples/gin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.metadata.outputs.build_time }}

      - name: Package Docker image
        run: |
          mkdir -p dist
          docker save "${IMAGE_NAME}:${GITHUB_SHA}" | gzip > "dist/${IMAGE_NAME}-${GITHUB_SHA}.tar.gz"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: dist/*.tar.gz
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/idempotency-example' }}
      HOST_PORT: ${{ secrets.APP_PORT || '8080' }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: dist

      - name: Validate deploy secrets
        run: |
          test -n "${DEPLOY_HOST}" || (echo "DEPLOY_HOST is required" && exit 1)
          test -n "${DEPLOY_USER}" || (echo "DEPLOY_USER is required" && exit 1)
          test -n "${DEPLOY_SSH_KEY}" || (echo "DEPLOY_SSH_KEY is required" && exit 1)

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload image to server
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}/images'"
          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT}" dist/*.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/images/${IMAGE_NAME}-${IMAGE_TAG}.tar.gz"

      - name: Load image and restart container
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' IMAGE_ARCHIVE='${DEPLOY_PATH}/images/${IMAGE_NAME}-${IMAGE_TAG}.tar.gz' IMAGE_NAME='${IMAGE_NAME}' IMAGE_TAG='${IMAGE_TAG}' CONTAINER_NAME='${CONTAINER_NAME}' HOST_PORT='${HOST_PORT}' CONTAINER_PORT='${CONTAINER_PORT}' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "${DEPLOY_PATH}"
          gzip -dc "${IMAGE_ARCHIVE}" | docker load
          ln -sfn "${IMAGE_ARCHIVE}" "${DEPLOY_PATH}/image-latest.tar.gz"

          docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true
          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart unless-stopped \
            -p "${HOST_PORT}:${CONTAINER_PORT}" \
            "${IMAGE_NAME}:${IMAGE_TAG}"

          echo "Saved image archive: ${IMAGE_ARCHIVE}"
          REMOTE
