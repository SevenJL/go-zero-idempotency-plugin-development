# =============================================================================
# CI Pipeline — lint, test, build, coverage
#
# Triggers:
#   - Push to main
#   - Pull request to main
#   - Manual dispatch (workflow_dispatch)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.25"

jobs:
  # ---------------------------------------------------------------------------
  # Lint — golangci-lint for static analysis
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m --out-format=colored-line-number
          working-directory: ${{ github.workspace }}

  # ---------------------------------------------------------------------------
  # Test — unit + integration tests with coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25"] # add "1.24" for backwards compat if needed
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run unit & integration tests
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic -timeout=120s

      - name: Run example tests
        run: |
          cd examples/gin
          go test ./... -count=1 -race -timeout=60s

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.out
          badge: true
          format: markdown
          output: both
          thresholds: "50 75"

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            code-coverage-results.md

  # ---------------------------------------------------------------------------
  # Build — verify the example app compiles
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build example binary
        run: go build -o /dev/null ./examples/gin/

      - name: Build check all packages
        run: go build ./...

  # ---------------------------------------------------------------------------
  # Docker — build image and verify it starts (smoke test)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: idempotency-example:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — start container and check health
        run: |
          docker run -d --rm -p 8080:8080 --name ci-smoke idempotency-example:ci-test
          # Wait for startup and check health endpoint
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Container failed to become healthy"
          docker logs ci-smoke
          exit 1

      - name: Cleanup
        if: always()
        run: docker stop ci-smoke || true
